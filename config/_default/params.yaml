# HugoBlox configuration
# Schema: https://docs.hugoblox.com/guides/theming/

hugoblox:
  schema: "2.0"

  identity:
    name: "Francisco Wilhelm"
    organization: "University of Bern"
    type: person
    tagline: "Career Researcher"
    description: "Francisco Wilhelm - Career researcher at the University of Bern. Research on career development, counseling, motivation, self-regulation, and R package development."
    social:
      twitter: ""

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "indigo"

  typography:
    pack: "modern"

  layout:
    radius: "md"
    spacing: "comfortable"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: true
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} {name}. This work is licensed under {license}"
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    type: person
    organization: "University of Bern"
    description: "Francisco Wilhelm - Career researcher at the University of Bern. Research on career development, counseling, motivation, self-regulation, and R package development."

  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  search:
    enable: true
    suggestions: []
    quick_actions: []

  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  privacy:
    enable: false
    anonymize_analytics: true
